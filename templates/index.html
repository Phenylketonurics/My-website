<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fun Website</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>
    
    <h1>My Essays</h1>
    
    <div class="essays-list">
        {% for essay in essays %}
            <div class="card">
                <h3><a href="{{ url_for('show_essay', name=essay) }}">{{ essay.replace("_", " ") }}</a></h3>
            </div>
        {% endfor %}
    </div>
</body>
</html>
